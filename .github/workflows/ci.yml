name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────── Test jobs ────────────────────────────

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test
      - run: cargo clippy -- -D warnings

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: pytest

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"
      - run: go test ./...
      - run: go vet ./...

  # ──────────────────────── Validate before deploy ────────────────────────
  # Dry-run all publishes to catch errors early, before any real publish.

  validate-deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [rust, typescript, python, go]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cp ../README.md ./ && cargo publish --dry-run
        working-directory: rust

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: npm install && npm run build && cp ../README.md ./ && npm publish --dry-run
        working-directory: ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install build twine && cp ../README.md ./ && python -m build
        working-directory: python

  # ──────────────────────── Deploy jobs (independent) ────────────────────────
  # Each can fail independently; a failed version can be fixed and retried
  # without affecting already-published packages.

  rust-deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate-deploy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cp ../README.md ./
      - run: cargo publish --token ${{ secrets.CARGO_TOKEN }}

  ts-deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate-deploy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: npm install && npm run build
      - run: cp ../README.md ./
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  py-deploy:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate-deploy]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install build twine
      - run: cp ../README.md ./
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate-deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
