[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "token-calibrator"
version = "0.1.0"
description = "Calibrated, self-learning token estimator for live context-size display"
license = { text = "MIT" }
readme = "../README.md"
repository = { url = "https://github.com/zlogic/token-calibrator" }
keywords = ["token", "estimator", "llm", "regression"]
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]
